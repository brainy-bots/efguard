name: Deploy DApp to GitHub Pages

on:
  push:
    branches: [main]
    paths: [dapps/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: dapps
        run: npm install

      - name: Build
        working-directory: dapps
        env:
          VITE_TENANT: ${{ vars.VITE_TENANT || 'stillness' }}
          VITE_EFGUARD_PACKAGE_ID: ${{ vars.VITE_EFGUARD_PACKAGE_ID || '' }}
        run: npx vite build --base /efguard/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dapps/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
